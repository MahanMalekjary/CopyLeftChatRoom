<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>CopyLeft Chat Room</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div id="loginBox" class="center">
    <h2>Copyleft Chatroom</h2>
    <button onclick="enterChat()">Enter</button>
  </div>


  <div id="chatBox" class="hidden">

    <div id="messages"></div>

    <div id="replyBox" class="replyBox hidden">

      <div id="replyInfo"></div>

      <button onclick="cancelReply()">
        ✖
      </button>

    </div>

    <div class="inputBox">
      <input id="msgInput" placeholder="Type message..." />
      <input type="file" id="fileInput" />
      <button id="sendBtn" onclick="sendMessage()">
        Send
      </button>
    </div>
  </div>

  <div id="myUsername"></div>


  <div id="mentionBadge" class="hidden">

  <span id="mentionCount">
    0
  </span>

</div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="app.js"></script>

</body>

</html>
